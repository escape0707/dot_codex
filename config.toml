writable_roots = [
    "~/.cache/gh",
    "~/.cache/ms-playwright",
    "~/.cache/pnpm",
    "~/.cache/uv",
    "~/.config/gws",
    "~/.local/share/pnpm",
    "~/.npm/_cacache/tmp",
    "~/.texlive/texmf-var",
    "~/.cache/chromium",
    "~/.config/chromium",
#    "C:\\Users\\jay\\AppData\\Local\\uv\\cache",
#    "C:\\Users\\jay\\AppData\\Local\\fnm_multishells",
]
